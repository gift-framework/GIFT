<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} — K₇</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

<nav>
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="nav-brand">K₇</a>
    <div class="lang-toggle" aria-label="Language">
      <a class="lang-en" href="#" aria-label="English">EN</a>
      <span aria-hidden="true">·</span>
      <a class="lang-fr" href="#" aria-label="Français">FR</a>
    </div>
    <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}#start">Guides</a></li>
      <li><a href="{{ '/' | relative_url }}#blog">Blog</a></li>
      <li><a href="{{ '/' | relative_url }}#results">Results</a></li>
      <li><a href="{{ '/' | relative_url }}#papers">Papers</a></li>
      <li><a href="{{ '/wiki/Home.html' | relative_url }}">Wiki</a></li>
      <li><a href="https://github.com/Arithmon/K7">GitHub</a></li>
    </ul>
  </div>
</nav>
<script>
  // List of pages for which a French translation exists, generated at
  // Jekyll build time. Each entry is the EN URL (with baseurl prefix);
  // the FR sibling lives at the same path with .html → .fr.html.
  window.K₇_FR_PAGES = new Set([
{%- for p in site.pages -%}
{%- if p.path contains ".fr.md" or p.path contains ".fr.html" -%}
{%- assign en_url = p.url | replace: ".fr.html", ".html" -%}
    "{{ en_url | relative_url }}",
{%- endif -%}
{%- endfor %}
  ]);

  (function(){
    // Mobile hamburger toggle
    var btn = document.querySelector('.nav-toggle');
    var links = document.querySelector('.nav-links');
    if (btn && links) {
      btn.addEventListener('click', function(){
        var open = links.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
    // Language toggle
    var path = window.location.pathname;
    if (path.endsWith('/')) path = path + 'index.html';
    var isFrench = path.endsWith('.fr.html');
    var enHref, frHref, enRefForCheck;
    if (isFrench) {
      enHref = path.replace('.fr.html', '.html');
      frHref = path;
      enRefForCheck = enHref;
    } else {
      enHref = path;
      frHref = path.replace(/\.html$/, '.fr.html');
      enRefForCheck = enHref;
    }
    // Hide the toggle entirely if no FR translation exists for this page
    var hasFrench = window.K₇_FR_PAGES.has(enRefForCheck);
    if (!hasFrench) {
      var toggle = document.querySelector('.lang-toggle');
      if (toggle) toggle.style.display = 'none';
      return;
    }
    var enLink = document.querySelector('.lang-en');
    var frLink = document.querySelector('.lang-fr');
    if (enLink) {
      enLink.href = enHref;
      if (!isFrench) enLink.classList.add('active');
    }
    if (frLink) {
      frLink.href = frHref;
      if (isFrench) frLink.classList.add('active');
    }
  })();
</script>

<main class="prose">
  <div class="container">
    {{ content }}
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <span>MIT License &middot; K₇ Framework v3.4</span>
      <span class="gift-from-bit">Gift from bit</span>
    </div>
  </div>
</footer>

<script data-goatcounter="https://gift-framework.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
